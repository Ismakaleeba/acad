<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Learn ACAD — The Architecture of Critical Action Design</title>
</head>

<body>
  <div id="app">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <h1>Learn ACAD</h1>
        <p>Official Learning Platform</p>
      </div>
      <nav id="nav-menu" class="nav-menu">
        <!-- Navigation items will be injected here -->
        <div class="nav-loading">Loading curriculum...</div>
      </nav>
    </aside>

    <main id="content-area" class="content-area">
      <div id="scroll-progress" class="scroll-progress"></div>
      <header class="content-header">
        <div class="header-left">
          <button id="menu-toggle" class="menu-toggle">☰ Menu</button>
          <div id="breadcrumb" class="breadcrumb">Overview</div>
        </div>
        <div class="header-right">
          <div id="search-trigger" class="search-trigger" title="Search (Cmd+K)">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            <span>Search</span>
            <kbd>⌘K</kbd>
          </div>
          <button id="notes-toggle" class="theme-toggle" title="Open Notes (Cmd+N)">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 20h9"></path>
              <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
            </svg>
          </button>
          <button id="glossary-toggle" class="theme-toggle" title="Open Glossary">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
              <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
            </svg>
          </button>
          <button id="theme-toggle" class="theme-toggle" title="Toggle Theme">
            <svg class="sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
              stroke-width="2">
              <circle cx="12" cy="12" r="5" />
              <line x1="12" y1="1" x2="12" y2="3" />
              <line x1="12" y1="21" x2="12" y2="23" />
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
              <line x1="1" y1="12" x2="3" y2="12" />
              <line x1="21" y1="12" x2="23" y2="12" />
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
            </svg>
            <svg class="moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
              stroke-width="2">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
            </svg>
          </button>
        </div>
      </header>

      <article id="main-content" class="main-content">
        <!-- Content will be injected here -->
      </article>

      <footer class="app-footer">
        <div class="footer-left">ACAD DEBATE MANUAL — ISMAEL KALEEBA</div>
        <div class="footer-right">© 2026</div>
      </footer>
    </main>
  </div>
  <button id="back-to-top" class="back-to-top" title="Back to Top">↑</button>

  <!-- Global Search Overlay -->
  <div id="search-overlay" class="search-overlay">
    <div class="search-modal">
      <div class="search-header">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
        <input type="text" id="search-input" placeholder="Search strategic concepts, chapters, tools..."
          autocomplete="off">
        <button id="close-search" class="close-search">ESC</button>
      </div>
      <div id="search-results" class="search-results">
        <div class="search-placeholder">Type to search the ACAD curriculum...</div>
      </div>
    </div>
  </div>

  <!-- Glossary Sliding Drawer -->
  <div id="glossary-drawer" class="glossary-drawer">
    <div class="drawer-header">
      <h2>Strategic Glossary</h2>
      <button id="close-glossary" class="close-drawer">✕ Close</button>
    </div>
    <div id="glossary-content" class="glossary-content">
      <!-- Terms and definitions will be injected here -->
    </div>
  </div>

  <!-- Notes Sliding Drawer -->
  <div id="notes-drawer" class="glossary-drawer notes-drawer">
    <div class="drawer-header">
      <h2>Strategic Notes</h2>
      <button id="close-notes" class="close-drawer">✕ Close</button>
    </div>
    <div class="notes-content">
      <textarea id="notes-textarea" placeholder="Record your strategic insights here..."></textarea>
      <div class="notes-footer">
        <span id="notes-save-status">Saved locally</span>
      </div>
    </div>
  </div>

  <!-- Floating Highlight Toolbar -->
  <div id="highlight-toolbar" class="highlight-toolbar">
    <button class="hl-btn" data-color="gold" title="Highlight Gold">
      <span class="hl-swatch gold"></span>
    </button>
    <button class="hl-btn" data-color="emerald" title="Highlight Emerald">
      <span class="hl-swatch emerald"></span>
    </button>
    <button class="hl-btn" data-color="ocean" title="Highlight Ocean">
      <span class="hl-swatch ocean"></span>
    </button>
    <button class="hl-btn" data-color="rose" title="Highlight Rose">
      <span class="hl-swatch rose"></span>
    </button>
    <div class="hl-divider"></div>
    <button id="hl-remove-btn" class="hl-remove-btn" title="Remove Highlight">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
